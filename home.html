<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- tailwind css and daisy ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="w-[90%] md:w-[100%]">
   <header class=" w-full">
     <div class="ml-4 navbar bg-base-100 shadow-sm justify-between items-center">
      <div class="flex">
        <img src="./assets/github-logo.png" alt="" class="w-[50%] md:w-[15%] " />
        <a class="btn btn-ghost text-xl hidden md:inline">GitHub Issues Tracker</a>
      </div>
      <div class="flex gap-2">
        
        <input
          id="input-search"
          type="text"
          placeholder="Search"
          class="input input-bordered w-full"
        />

        <div class="w-full mr-7">
          <button class="btn btn-primary w-full flex justify-center items-center"><span class="text-2xl">+</span>New Issue</button>
        </div>
      </div>
    </div>
   </header>
   <main class="max-w-[1400px] mx-auto mt-4">
    <section>
      <div class="buttons bg-white shadow-md rounded-[10px] py-5 px-5 flex gap-2">
        <button
          id="allBtn" onclick="filterBtn(id)"
          class="bg-primary py-[8px] px-[12px] text-[#64748B] text-white rounded-md w-[80px] font-medium border border-[#E4E4E7]"
        >
          All
        </button>
        <button
          id="openBtn"  onclick="filterBtn(id)"
          class="border border-[#E4E4E7] py-[8px] px-[12px] rounded-sm "
        >
          Open
        </button>
        <button
          id="closeBtn" onclick="filterBtn(id)"
          class="border border-[#E4E4E7] py-[8px] px-[12px] rounded-sm text-[#64748B]"
        >
          Close
        </button>
    </section>

    <section>
      <div class="bg-white shadow-2xl flex justify-between items-center space-y-2 mt-4 p-4 rounded">
        <div class="flex items-center gap-2">
          <img src="./assets/Aperture.png" alt="">
          <div>
            <p  class="text-[20px] font-semibold"><span id="issueCount">0</span> Issues</p>
            <p class="text-[1rem] opacity-80">Track and manage your project issues</p>
          </div>
        </div>
        <div>
          <p class="bg-green-600 rounded-full w-3 h-3 inline-block ml-2"></p>
          <span class="text-[1rem] font-medium">Open</span>
          <span class="bg-primary rounded-full w-3 h-3 inline-block"></span>
          <span class="text-[1rem] font-medium">Close</span>
        </div>
      </div>
    </section>

    <section id="cardContainer" class="bg-white shadow-2xl mt-4 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 p-4">
    </section>
    <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
      <span class="loading loading-spinner loading-xl"></span>
    </div>
    <!-- Modal details -->
     <!-- Open the modal using ID.showModal() method -->

      <dialog id="issueDetail" class="modal">
        
      </dialog>
   </main>
    <script src="./script/script.js"></script>
  </body>
</html>
